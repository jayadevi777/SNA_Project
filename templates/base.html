<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tenkasi Tourism SNA{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">🗺️</div>
            <div>
                <h1>Tenkasi Tourism</h1>
                <p>Social Network Analysis Platform</p>
            </div>
        </div>
        <nav class="nav">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/analytics" class="{% if request.path == '/analytics' %}active{% endif %}">Analytics</a>
            <a href="/recommendations" class="{% if request.path == '/recommendations' %}active{% endif %}">Recommendations</a>
            <a href="/places" class="{% if request.path == '/places' %}active{% endif %}">Places</a>
            <a href="/graphs" class="{% if request.path == '/graphs' %}active{% endif %}">Graphs</a>
            <a href="/exports" class="{% if request.path == '/exports' %}active{% endif %}">Exports</a>
        </nav>
    </header>
    <main class="shell">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
